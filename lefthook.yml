# Rust hooks removed as part of Phase 6 migration (bd-81)
# - rustfmt and clippy blocks removed (project moving away from Rust)
# - Verified clean of all Rust references: 2026-04-17

pre-commit:
  parallel: true
  commands:
    isort:
      glob: "*.py"
      run: |
        if command -v uv >/dev/null 2>&1 && uv run isort --version >/dev/null 2>&1; then
          uv run isort --profile black {staged_files}
        elif command -v isort >/dev/null 2>&1; then
          isort --profile black {staged_files}
        else
          echo "isort not found; using ruff import sorter";
          if command -v uv >/dev/null 2>&1; then
            uv run ruff check --select I --fix {staged_files}
          else
            ruff check --select I --fix {staged_files}
          fi
        fi
      stage_fixed: true
    ruff-format:
      glob: "*.py"
      run: |
        if command -v uv >/dev/null 2>&1; then
          uv run ruff format {staged_files}
        else
          ruff format {staged_files}
        fi
      stage_fixed: true
    ruff-lint:
      glob: "*.py"
      run: |
        if command -v uv >/dev/null 2>&1; then
          uv run ruff check --fix {staged_files}
        else
          ruff check --fix {staged_files}
        fi
      stage_fixed: true
    # Plugin-focused pytest for pack_parallelism (pre-commit, not assuming pytest-timeout)
    plugin-tests:
      glob: "code_puppy/plugins/**/*.py"
      run: |
        if command -v uv >/dev/null 2>&1 && uv run pytest --version >/dev/null 2>&1; then
          echo "Running plugin-focused tests...";
          uv run pytest tests/plugins/pack_parallelism/ -v -x --tb=short || echo "Plugin tests found issues (non-blocking)";
        elif command -v pytest >/dev/null 2>&1; then
          echo "Running plugin-focused tests...";
          pytest tests/plugins/pack_parallelism/ -v -x --tb=short || echo "Plugin tests found issues (non-blocking)";
        else
          echo "pytest not found; skipping plugin tests. Install with: uv add --dev pytest";
        fi
      fail_text: "Plugin tests found issues (not blocking commit)"

# pre-push hook removed - tests run in CI only
# (except for advisory test review — see below)

pre-push:
  commands:
    test-review:
      glob: "**/test/**_test.exs"
      run: |
        echo "📋 Advisory: Test file review"
        echo "─────────────────────────────────────"
        if [[ -x scripts/review-tests.sh ]]; then
          scripts/review-tests.sh {push_files} 2>&1 || echo "⚠ Review found issues (advisory, not blocking push)"
        else
          echo "review-tests.sh not found — skipping automated review"
          echo "Run manually: ./scripts/review-tests.sh <test_files>"
        fi
        echo "─────────────────────────────────────"
        # Always exit 0 — advisory only, never blocks push
        exit 0
      fail_text: "Test review completed with findings (advisory — push continues)"
