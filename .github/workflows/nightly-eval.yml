name: Nightly Eval (bd-235)

on:
  # Run at 2 AM UTC daily
  schedule:
    - cron: '0 2 * * *'
  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Force run even if no changes'
        type: boolean
        default: false

# Prevent concurrent runs to avoid API rate limits and cost spikes
concurrency:
  group: nightly-eval
  cancel-in-progress: false

env:
  # Budget alert: estimated cost per run ~$5-10 USD
  # Fail fast if costs exceed expectations
  MAX_EVAL_COST_USD: '15.00'
  # Force eval execution (required for tests tagged with @eval)
  RUN_EVALS: '1'

jobs:
  # Pre-check: estimate cost and fail fast if budget exceeded
  budget-gate:
    name: Budget Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
    steps:
      - name: Budget alert check
        id: gate
        run: |
          echo "::warning::Nightly eval estimated cost: $${{ env.MAX_EVAL_COST_USD }} USD max per run"
          echo "::notice::Costs: Anthropic API (~$0.01-0.05 per call), OpenAI API (~$0.01-0.10 per call)"
          echo "should_run=true" >> "$GITHUB_OUTPUT"

  # Run Elixir eval tests
  elixir-eval:
    name: Elixir Eval Tests
    runs-on: ubuntu-latest
    needs: budget-gate
    if: needs.budget-gate.outputs.should_run == 'true'
    defaults:
      run:
        working-directory: elixir/code_puppy_control

    outputs:
      elixir_exit_code: ${{ steps.run_elixir.outputs.exit_code }}

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15'
          otp-version: '26'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            elixir/code_puppy_control/deps
            elixir/code_puppy_control/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/code_puppy_control/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run Elixir eval tests
        id: run_elixir
        run: |
          # Create logs directory
          mkdir -p evals/logs
          # Run eval tests - capture exit code but don't fail job immediately
          mix test --only eval || EXIT_CODE=$?
          echo "exit_code=${EXIT_CODE:-0}" >> "$GITHUB_OUTPUT"
          exit 0
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Redirect eval logs to known location
          EVAL_LOG_DIR: ${{ github.workspace }}/evals/logs/elixir

      - name: Upload Elixir logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: elixir-eval-logs
          path: evals/logs/elixir/*.json
          if-no-files-found: ignore

  # Compare outputs and generate parity report
  parity-diff:
    name: Parity Diff
    runs-on: ubuntu-latest
    needs: [elixir-eval]
    if: always() && needs.elixir-eval.result != 'cancelled'

    outputs:
      parity_passed: ${{ steps.compare.outputs.parity_passed }}
      diff_summary: ${{ steps.compare.outputs.diff_summary }}

    steps:
      - uses: actions/checkout@v4

      - name: Download Elixir logs
        uses: actions/download-artifact@v4
        with:
          name: elixir-eval-logs
          path: evals/logs/elixir
        continue-on-error: true

      - name: Download Python logs
        uses: actions/download-artifact@v4
        with:
          name: python-eval-logs
          path: evals/logs/python
        continue-on-error: true

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Compare eval outputs
        id: compare
        run: |
          mkdir -p evals/logs/comparison

          # Check if log files exist
          ELIXIR_DIR="evals/logs/elixir"
          PYTHON_DIR="evals/logs/python"

          if [ ! -d "$ELIXIR_DIR" ] && [ ! -d "$PYTHON_DIR" ]; then
            echo "::warning::No eval logs found from either Elixir or Python"
            echo "parity_passed=true" >> "$GITHUB_OUTPUT"
            echo "diff_summary=No eval logs to compare" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Normalize timestamps and compare JSON files
          # Files are matched by name across elixir/ and python/ directories
          DIFF_FOUND=false
          DIFF_SUMMARY=""

          # Find all JSON files and compare
          for file in $(find evals/logs -name "*.json" -type f 2>/dev/null | sort); do
            echo "Processing: $file"
          done

          # Create normalized versions (remove timestamps for comparison)
          if [ -d "$ELIXIR_DIR" ]; then
            for f in "$ELIXIR_DIR"/*.json; do
              [ -f "$f" ] || continue
              basename=$(basename "$f")
              jq 'del(.timestamp, .started_at, .finished_at)' "$f" > "evals/logs/comparison/elixir_${basename}"
            done
          fi

          if [ -d "$PYTHON_DIR" ]; then
            for f in "$PYTHON_DIR"/*.json; do
              [ -f "$f" ] || continue
              basename=$(basename "$f")
              jq 'del(.timestamp, .started_at, .finished_at)' "$f" > "evals/logs/comparison/python_${basename}"
            done
          fi

          # Run diff on normalized outputs
          if [ -d "$ELIXIR_DIR" ] && [ -d "$PYTHON_DIR" ]; then
            echo "::group::Parity Diff Results"
            if diff -r "$ELIXIR_DIR" "$PYTHON_DIR" --exclude="*.timestamp"; then
              echo "✅ Parity check PASSED: Elixir and Python outputs match"
              DIFF_SUMMARY="✅ Parity PASSED: Outputs match"
            else
              echo "::error::Parity check FAILED: Output differences detected"
              echo "Running detailed diff..."
              diff -r "evals/logs/comparison" --unified=2 || true
              DIFF_FOUND=true
              DIFF_SUMMARY="❌ Parity FAILED: Output differences detected (see logs)"
            fi
            echo "::endgroup::"
          else
            DIFF_SUMMARY="⚠️ Skipped parity check: missing logs from one side"
          fi

          echo "parity_passed=$DIFF_FOUND" >> "$GITHUB_OUTPUT"
          echo "diff_summary=$DIFF_SUMMARY" >> "$GITHUB_OUTPUT"

      - name: Upload comparison results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: parity-comparison
          path: evals/logs/comparison/
          if-no-files-found: ignore

  # Post results summary
  post-results:
    name: Post Results
    runs-on: ubuntu-latest
    needs: [elixir-eval, parity-diff]
    if: always()

    permissions:
      issues: write
      contents: read

    steps:
      - name: Generate summary
        id: summary
        run: |
          ELIXIR_STATUS="${{ needs.elixir-eval.result }}"
          PYTHON_STATUS="${{ needs.python-eval.result }}"
          PARITY_STATUS="${{ needs.parity-diff.outputs.parity_passed }}"
          DIFF_SUMMARY="${{ needs.parity-diff.outputs.diff_summary }}"

          # Determine overall status
          if [ "$ELIXIR_STATUS" = "success" ] && [ "$PARITY_STATUS" = "true" ]; then
            OVERALL="✅ PASSED"
            STATUS_CODE=0
          else
            OVERALL="❌ FAILED"
            STATUS_CODE=1
          fi

          # Build markdown summary
          cat << 'EOF' > summary.md
          ## 🧪 Nightly Eval Results

          **Workflow:** ${{ github.workflow }}  
          **Run Date:** ${{ github.event.schedule || 'manual' }}  
          **Commit:** ${{ github.sha }}

          ### Test Results

          | Component | Status | Details |
          |-----------|--------|---------|
          | Elixir Eval | ${{ needs.elixir-eval.result == 'success' && '✅ Passed' || '❌ Failed' }} | Exit: ${{ needs.elixir-eval.outputs.elixir_exit_code }} |
          | Python Eval | ⏭️ Removed | Tests migrated to Elixir |
          | Parity Diff | $PARITY_STATUS | $DIFF_SUMMARY |

          ### Cost Summary

          - **Budget Cap:** $${{ env.MAX_EVAL_COST_USD }} USD
          - **APIs Used:** Anthropic, OpenAI
          - **Note:** Actual costs vary based on token usage

          ### Artifacts

          - [Elixir Eval Logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
          - [Parity Comparison](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---
          *This is an automated nightly eval run. See bd-235 for details.*
          EOF

          # Replace variables in summary
          sed -i "s/\$PARITY_STATUS/$([ \"$PARITY_STATUS\" = \"true\" ] && echo \"✅ Passed\" || echo \"❌ Failed\")/g" summary.md
          sed -i "s/\$DIFF_SUMMARY/$DIFF_SUMMARY/g" summary.md

          echo "summary<<EOF" >> "$GITHUB_OUTPUT"
          cat summary.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          exit $STATUS_CODE

      - name: Post to issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('summary.md', 'utf8');

            // Look for existing nightly-eval issue or create comment
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'nightly-eval',
              state: 'open'
            });

            if (issues.data.length > 0) {
              // Comment on existing issue
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: summary
              });
            } else {
              // Create new issue
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Nightly Eval Results - ${new Date().toISOString().split('T')[0]}`,
                body: summary,
                labels: ['nightly-eval', 'automated']
              });
            }

      - name: Job summary
        run: |
          cat summary.md >> "$GITHUB_STEP_SUMMARY"

  # Final gate: parity failures block release pipeline (documented, not wired yet)
  release-gate:
    name: Release Pipeline Gate
    runs-on: ubuntu-latest
    needs: [parity-diff, elixir-eval, python-eval]
    if: always()

    steps:
      - name: Document release blocking
        run: |
          echo "::group::Release Pipeline Gate Status"
          echo "Parity failures are configured to block the release pipeline."
          echo "This is currently documented-only; actual wiring to release pipeline comes later (see bd-235)."
          echo ""
          echo "Current parity status: ${{ needs.parity-diff.outputs.parity_passed }}"
          echo ""
          echo "To wire this up:"
          echo "  1. Add 'needs: release-gate' to the release workflow"
          echo "  2. Check 'if: needs.release-gate.result == success'"
          echo "::endgroup::"

          # Fail the job if parity failed (for visibility)
          if [ "${{ needs.parity-diff.outputs.parity_passed }}" = "false" ]; then
            echo "::error::Parity check failed - this would block releases when wired up"
            exit 1
          fi
