name: Burrito Release (bd-236)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      draft:
        description: 'Create draft release (tags only)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: bd-236 build ${{ matrix.burrito_target }}
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: elixir/code_puppy_control

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            burrito_target: macos_arm64
            artifact_name: code_puppy_control_macos_arm64
          - os: ubuntu-latest
            burrito_target: linux_x86_64
            artifact_name: code_puppy_control_linux_x86_64
          - os: windows-latest
            burrito_target: windows_x86_64
            artifact_name: code_puppy_control_windows_x86_64.exe

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15'
          otp-version: '26'

      - name: Install xz (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          # xz is required for Burrito payload compression. Preinstalled on macOS,
          # usually present on ubuntu-latest but ensure it's there.
          if ! command -v xz >/dev/null 2>&1; then
            if [[ "$RUNNER_OS" == "Linux" ]]; then
              sudo apt-get update && sudo apt-get install -y xz-utils
            fi
          fi
          xz --version

      - name: Verify 7-Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # 7z is preinstalled on windows-latest per GitHub docs.
          # This step verifies it's available for Burrito's Windows payload handling.
          7z | Select-Object -First 3

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            elixir/code_puppy_control/deps
            elixir/code_puppy_control/_build/prod
          key: burrito-${{ runner.os }}-${{ hashFiles('elixir/code_puppy_control/mix.lock') }}
          restore-keys: |
            burrito-${{ runner.os }}-

      - name: Build Burrito release
        env:
          MIX_ENV: prod
          BURRITO_TARGET: ${{ matrix.burrito_target }}
        shell: bash
        run: |
          mix deps.get --only prod
          mix deps.compile
          mix compile
          mix release code_puppy_control --overwrite

      - name: Verify build output
        shell: bash
        run: |
          if [[ ! -d burrito_out ]]; then
            echo "::error::burrito_out/ directory missing — build failed"
            exit 1
          fi
          ls -lh burrito_out/
          if [[ -z "$(ls -A burrito_out/)" ]]; then
            echo "::error::burrito_out/ is empty — build produced no artifacts"
            exit 1
          fi

      # ── Windows Authenticode signing (bd-240) ──────────────────────────
      # Signs the Windows binary with signtool.exe to avoid SmartScreen
      # "unrecognized app" warnings. Requires two repository secrets:
      #   WINDOWS_CODESIGN_CERT_BASE64 – base64-encoded PFX certificate
      #   WINDOWS_CODESIGN_PASSWORD   – PFX encryption password
      # The step is silently skipped when secrets are absent, so the
      # workflow still works for forks / test runs without a cert.

      - name: Authenticode-sign Windows binary
        if: >-
          matrix.burrito_target == 'windows_x86_64'
          && secrets.WINDOWS_CODESIGN_CERT_BASE64 != ''
          && secrets.WINDOWS_CODESIGN_PASSWORD != ''
        shell: pwsh
        env:
          CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
          CODESIGN_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_PASSWORD }}
        run: |
          # Locate the .exe produced by Burrito
          $exePath = Get-ChildItem -Path burrito_out -Filter *.exe -Recurse |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $exePath) {
            Write-Error "No .exe found in burrito_out/ — cannot sign"
            exit 1
          }

          Write-Host "Signing: $exePath"

          # Decode base64 PFX to a temporary file (never written to disk
          # in cleartext; the PFX itself is encrypted at rest).
          $pfxPath = Join-Path $env:RUNNER_TEMP 'codesign.pfx'
          [Convert]::FromBase64String($env:CODESIGN_CERT_BASE64) |
            Set-Content -Path $pfxPath -AsByteStream

          try {
            # Import cert into the current-user "My" store so signtool can
            # find it by subject name.  -Exportable lets us clean up later.
            $pwd = ConvertTo-SecureString $env:CODESIGN_PASSWORD -AsPlainText -Force
            Import-PfxCertificate -FilePath $pfxPath `
              -CertStoreLocation Cert:\CurrentUser\My `
              -Password $pwd -Exportable

            # Determine the certificate subject / SHA-1 thumbprint.
            # signtool supports /sha1 (thumbprint) for unambiguous selection.
            $cert = Get-PfxData -FilePath $pfxPath -Password $pwd |
              Select-Object -ExpandProperty EndEntityCertificates |
              Select-Object -First 1
            $thumbprint = $cert.Certificate.Thumbprint
            Write-Host "Certificate thumbprint: $thumbprint"

            # ── signtool.exe ────────────────────────────────────────────
            # Windows SDK ships signtool.  windows-latest images include
            # it; locate it via the installed SDK path.
            $signtool = Get-ChildItem -Path 'C:\Program Files (x86)\Windows Kits\10\bin' `
              -Recurse -Filter signtool.exe |
              Where-Object { $_.FullName -match '\\x64\\' } |
              Sort-Object FullName -Descending |
              Select-Object -First 1 -ExpandProperty FullName

            if (-not $signtool) {
              Write-Error 'signtool.exe not found — is Windows SDK installed?'
              exit 1
            }

            Write-Host "Using signtool: $signtool"

            # Sign with SHA-256 digest (modern Authenticode).
            # /tr  — RFC 3161 timestamp server (DigiCert)
            # /td  — timestamp digest algorithm
            # /fd  — file digest algorithm
            & $signtool sign /sha1 $thumbprint `
              /fd SHA256 `
              /tr http://timestamp.digicert.com `
              /td SHA256 `
              /a `
              $exePath

            if ($LASTEXITCODE -ne 0) {
              Write-Error "signtool exited with code $LASTEXITCODE"
              exit $LASTEXITCODE
            }

            Write-Host '✅ Authenticode signing succeeded'

            # Verify signature
            & $signtool verify /pa $exePath
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Signature verification failed (exit $LASTEXITCODE)"
              exit $LASTEXITCODE
            }
            Write-Host '✅ Signature verification passed'
          }
          finally {
            # ── Cleanup ────────────────────────────────────────────────
            # Remove cert from user store regardless of signing outcome.
            Get-ChildItem Cert:\CurrentUser\My |
              Where-Object { $_.Thumbprint -eq $thumbprint } |
              Remove-Item

            Remove-Item -Force -ErrorAction SilentlyContinue $pfxPath
          }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: elixir/code_puppy_control/burrito_out/*
          if-no-files-found: error
          retention-days: 14

  release:
    name: bd-236 publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifact directory
        run: |
          mkdir -p release-files
          find artifacts -type f -exec cp {} release-files/ \;
          ls -lh release-files/

      - name: Compute checksums
        run: |
          cd release-files
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          body: |
            ## Burrito single-binary release

            Binaries produced by `.github/workflows/burrito-release.yml` (bd-236).

            | Platform | File |
            |---|---|
            | macOS Apple Silicon | `code_puppy_control_macos_arm64` |
            | Linux x86_64 (glibc) | `code_puppy_control_linux_x86_64` |
            | Windows x86_64 | `code_puppy_control_windows_x86_64.exe` |

            ### Known limitations (follow-up tickets tracked)

            - **No macOS codesigning/notarization** (bd-241) — run `xattr -c <binary>` to bypass Gatekeeper
            - **Windows Authenticode signing** (bd-240) — applied when `WINDOWS_CODESIGN_CERT_BASE64` and `WINDOWS_CODESIGN_PASSWORD` secrets are configured; SmartScreen may still warn if unsigned (e.g. fork builds)
            - **No `linux_arm64` / `macos_x86_64` / `linux_musl`** (bd-239, follow-ups)

            ### Verification

            SHA-256 checksums are in `SHA256SUMS.txt`. Verify with:
            ```
            sha256sum -c SHA256SUMS.txt
            ```
