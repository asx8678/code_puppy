name: turbo_parse CI

on:
  push:
    branches: [main]
    paths:
      - 'turbo_parse/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/turbo_parse.yml'
  pull_request:
    branches: [main]
    paths:
      - 'turbo_parse/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/turbo_parse.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cargo-test:
    name: Cargo Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: turbo_parse -> target
          shared-key: turbo-parse-${{ matrix.os }}

      - name: Check formatting
        run: cargo fmt -p turbo_parse -- --check
        working-directory: ${{ github.workspace }}

      - name: Run clippy
        run: cargo clippy -p turbo_parse --all-features -- -D warnings
        working-directory: ${{ github.workspace }}

      - name: Run cargo test
        run: cargo test -p turbo_parse --release
        working-directory: ${{ github.workspace }}

  maturin-build:
    name: Build Wheels
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: turbo_parse -> target
          shared-key: turbo-parse-wheels-${{ matrix.os }}

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install maturin
        run: |
          python -m pip install --upgrade pip
          pip install maturin

      - name: Build release wheels (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: maturin build --release --strip
        working-directory: ${{ github.workspace }}/turbo_parse

      - name: Build release wheels (Windows)
        if: matrix.os == 'windows-latest'
        run: maturin build --release
        working-directory: ${{ github.workspace }}/turbo_parse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: turbo_parse/target/wheels/*.whl
          if-no-files-found: error
          retention-days: 7

  test-wheel-install:
    name: Test Wheel Install
    needs: maturin-build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ['3.11']
    steps:
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: wheels

      - name: Install wheel
        shell: bash
        run: |
          pip install wheels/*.whl

      - name: Test import
        run: |
          python -c "import turbo_parse; print(turbo_parse.health_check())"

  # Build manylinux wheels for Linux distribution
  maturin-build-manylinux:
    name: Build manylinux Wheels
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64, aarch64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: turbo_parse -> target
          shared-key: turbo-parse-manylinux-${{ matrix.target }}

      - name: Build wheels with maturin (manylinux)
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --strip --out dist
          working-directory: turbo_parse

      - name: Upload manylinux wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-manylinux-${{ matrix.target }}
          path: turbo_parse/dist/*.whl
          if-no-files-found: error
          retention-days: 7

  check:
    name: CI Summary
    needs: [cargo-test, maturin-build, test-wheel-install, maturin-build-manylinux]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Mark result
        run: |
          if [ "${{ needs.cargo-test.result }}" != "success" ]; then
            echo "❌ Cargo tests failed"
            exit 1
          fi
          if [ "${{ needs.maturin-build.result }}" != "success" ]; then
            echo "❌ Wheel builds failed"
            exit 1
          fi
          if [ "${{ needs.test-wheel-install.result }}" != "success" ]; then
            echo "❌ Wheel install tests failed"
            exit 1
          fi
          if [ "${{ needs.maturin-build-manylinux.result }}" != "success" ]; then
            echo "❌ manylinux wheel builds failed"
            exit 1
          fi
          echo "✅ All CI checks passed!"
