# Publishes the package to PyPI when a GitHub Release is published.
# Also supports manual trigger via workflow_dispatch.
#
# Prerequisites:
#   Configure Trusted Publishing on PyPI for this repo:
#   https://pypi.org/manage/project/codepp/settings/publishing/

name: Build and Publish to PyPI

permissions:
  contents: write

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest]
        python-version: ['3.14']
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Setup uv virtual environment
        run: uv venv

      - name: Install dependencies
        run: uv pip install -e ".[dev]" || uv pip install -e .

      - name: Install pexpect for integration tests
        run: uv pip install pexpect>=4.9.0

      - name: Run tests
        env:
          CI: '1'
          CODE_PUPPY_TEST_FAST: '1'
          CEREBRAS_API_KEY: ${{ secrets.CEREBRAS_API_KEY || 'fake-key-for-ci-testing' }}
          CONTEXT7_API_KEY: ${{ secrets.CONTEXT7_API_KEY || 'fake-key-for-ci-testing' }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY || 'fake-key-for-ci-testing' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY || 'fake-key-for-ci-testing' }}
          SYN_API_KEY: ${{ secrets.SYN_API_KEY || 'fake-key-for-ci-testing' }}
        run: |
          echo "Running tests on ${{ runner.os }} with Python ${{ matrix.python-version }}..."
          uv run pytest tests/ -v --cov=code_puppy --cov-report=term-missing

  build-publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Install uv
        run: pip install uv

      - name: Setup uv virtual environment
        run: uv venv

      - name: Set version from release tag
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "Setting version to ${VERSION} from release tag ${TAG}"
          uv version "${VERSION}"

      - name: Bump patch version (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        run: uv version --bump patch

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Push version bump to GitHub
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "chore: bump version to $(uv version) [ci skip]" || echo "No changes to commit"
          git push
