name: Test File Review

# Automated code review for test file changes.
# Runs elixir-reviewer on changed test files.
# Advisory only — does NOT block merge.

on:
  pull_request:
    paths:
      - 'elixir/code_puppy_control/test/**_test.exs'

jobs:
  detect-files:
    name: Detect changed test files
    runs-on: ubuntu-latest
    outputs:
      elixir_files: ${{ steps.filter.outputs.elixir_files }}
      has_changes: ${{ steps.filter.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4

      - name: Get changed test files
        id: filter
        run: |
          # Get list of changed files in this PR
          FILES=$(git diff --name-only origin/main...HEAD 2>/dev/null || git diff --name-only HEAD~1)

          # Filter for Elixir test files
          ELIXIR_FILES=$(echo "$FILES" | grep -E 'elixir/code_puppy_control/test/.*_test\.exs$' || true)
          echo "elixir_files=${ELIXIR_FILES}" >> "$GITHUB_OUTPUT"

          # Determine if we have anything to review
          if [[ -n "$ELIXIR_FILES" ]]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  elixir-review:
    name: Elixir test review
    needs: detect-files
    if: needs.detect-files.outputs.elixir_files != ''
    runs-on: ubuntu-latest
    continue-on-error: true  # Advisory — don't block the pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Set up Code Puppy
        run: |
          if ! command -v code-puppy >/dev/null 2>&1; then
            echo "::notice::code-puppy CLI not available — posting manual review instructions"
          fi

      - name: Run elixir-reviewer
        id: review
        run: |
          ELIXIR_FILES="${{ needs.detect-files.outputs.elixir_files }}"
          echo "Reviewing Elixir test files:"
          echo "$ELIXIR_FILES"

          REVIEW_OUTPUT="## 🔬 Elixir Test Review (advisory)\n\n"

          if command -v code-puppy >/dev/null 2>&1; then
            for file in $ELIXIR_FILES; do
              RESULT=$(code-puppy --agent elixir-reviewer --prompt "Review test file: ${file}" 2>&1 || echo "Review failed")
              REVIEW_OUTPUT+="- **${file}**: ${RESULT}\n"
            done
          else
            REVIEW_OUTPUT+="> code-puppy CLI not available in CI.\n"
            REVIEW_OUTPUT+="> Run locally: \`code-puppy --agent elixir-reviewer --prompt 'Review test file: <path>'\`\n\n"
            for file in $ELIXIR_FILES; do
              REVIEW_OUTPUT+="- ⏳ **${file}**: Pending manual review\n"
            done
          fi

          echo "review_output<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REVIEW_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.review.outputs.review_output }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: output
            });

  qa-review:
    name: QA coverage analysis
    needs: detect-files
    if: needs.detect-files.outputs.has_changes == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true  # Advisory — don't block the pipeline

    steps:
      - uses: actions/checkout@v4

      - name: Run qa-expert
        id: review
        run: |
          ALL_FILES="${{ needs.detect-files.outputs.elixir_files }}"
          echo "QA coverage analysis for:"
          echo "$ALL_FILES"

          REVIEW_OUTPUT="## 🐾 QA Coverage Analysis (advisory)\n\n"

          if command -v code-puppy >/dev/null 2>&1; then
            RESULT=$(code-puppy --agent qa-expert --prompt "Analyze test coverage for: ${ALL_FILES}" 2>&1 || echo "Analysis failed")
            REVIEW_OUTPUT+="${RESULT}\n"
          else
            REVIEW_OUTPUT+="> code-puppy CLI not available in CI.\n"
            REVIEW_OUTPUT+="> Run locally: \`code-puppy --agent qa-expert --prompt 'Analyze test coverage for: <files>'\`\n\n"
            REVIEW_OUTPUT+="### ⏳ Pending QA Analysis\n\n"
            REVIEW_OUTPUT+="The following test files were modified and should be reviewed for coverage:\n\n"
            for file in $ALL_FILES; do
              [[ -z "$file" ]] && continue
              REVIEW_OUTPUT+="- ${file}\n"
            done
          fi

          echo "review_output<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$REVIEW_OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Post QA comment
        uses: actions/github-script@v7
        with:
          script: |
            const output = `${{ steps.review.outputs.review_output }}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: output
            });
