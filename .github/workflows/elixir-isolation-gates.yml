name: Elixir Isolation Gates (bd-186)

on:
  pull_request:
  push:
    branches: [main]

jobs:
  isolation-gates:
    name: bd-186 isolation gates
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir/code_puppy_control

    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          elixir-version: '1.15'
          otp-version: '26'

      - name: Restore deps cache
        uses: actions/cache@v4
        with:
          path: |
            elixir/code_puppy_control/deps
            elixir/code_puppy_control/_build
          key: ${{ runner.os }}-mix-${{ hashFiles('elixir/code_puppy_control/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-

      - name: Install dependencies
        run: mix deps.get

      - name: Compile
        run: mix compile

      - name: Run isolation gates
        run: MIX_ENV=test mix gates.isolation

      - name: Run full config test suite (GATE-1 no-leak verification)
        run: MIX_ENV=test mix test test/code_puppy_control/config/
        env:
          # Force PUP_EX_HOME to a known-clean path so no test leaks to real HOME
          PUP_EX_HOME: /tmp/pup_ex_ci_home

  no-shadow-tree:
    name: bd-229 no shadow tree at repo root
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check for shadow source tree
        run: |
          if [ -e lib ] || [ -e test ]; then
            echo "::error::Shadow source tree detected at repo root. Canonical project lives at elixir/code_puppy_control/. See bd-229."
            ls -la lib test 2>&1 | head -20 || true
            exit 1
          fi
          echo "OK: no shadow tree at repo root."
