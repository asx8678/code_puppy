name: Python CI

on:
  push:
    paths:
      - 'code_puppy/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python.yml'
  pull_request:
    paths:
      - 'code_puppy/**'
      - 'tests/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - '.github/workflows/python.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Set up Python
        run: uv python install 3.11
      
      - name: Install dependencies
        run: uv sync --frozen --group dev
      
      - name: Ruff check
        run: uv run ruff check .
      
      - name: Ruff format check
        run: uv run ruff format --check .

  smoke:
    name: Import Smoke Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Set up Python
        run: uv python install 3.11
      
      - name: Install dependencies
        run: uv sync --frozen
      
      - name: Smoke test - session_storage (BUG-01)
        run: uv run python -c "import code_puppy.session_storage; print('✅ session_storage imports OK')"
      
      - name: Smoke test - config
        run: uv run python -c "import code_puppy.config; print('✅ config imports OK')"
      
      - name: Smoke test - main
        run: uv run python -c "import code_puppy.main; print('✅ main imports OK')"

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      
      - name: Install dependencies
        run: uv sync --frozen --group dev
      
      - name: Run tests
        run: uv run pytest tests/ -q --tb=short -x
        env:
          PYTHONDONTWRITEBYTECODE: 1
